<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <style>
    .label { font-family: Arial, sans-serif; font-size: 14px; }
    .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; }
    .box { stroke: #333; stroke-width: 2px; }
    .aws-orange { fill: #FF9900; }
    .aws-dark { fill: #232F3E; }
    .client { fill: #4B8BF5; }
    .lambda { fill: #D86613; }
    .ecs { fill: #C925D1; }
    .arrow { stroke: #666; stroke-width: 2; marker-end: url(#arrowhead); }
    .network { stroke: #888; stroke-width: 1; stroke-dasharray: 5,5; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
    </marker>
  </defs>

  <!-- Background AWS Cloud -->
  <rect x="200" y="50" width="550" height="400" rx="20" ry="20" fill="#F7F7F7" stroke="#888" stroke-width="1" stroke-dasharray="5,5" />
  <text x="475" y="80" text-anchor="middle" class="label">AWS Cloud</text>

  <!-- Client Machine -->
  <rect x="50" y="200" width="120" height="80" rx="5" ry="5" class="box client" />
  <text x="110" y="240" text-anchor="middle" fill="white" class="label">Client Machine</text>
  <text x="110" y="260" text-anchor="middle" fill="white" class="label">Parsl</text>

  <!-- AWS Services -->
  <!-- Lambda Section -->
  <rect x="250" y="110" width="200" height="160" rx="10" ry="10" fill="#FFF8E1" stroke="#D86613" stroke-width="1" />
  <text x="350" y="130" text-anchor="middle" class="label">AWS Lambda</text>
  
  <g transform="translate(270, 150)">
    <rect width="70" height="50" rx="5" ry="5" class="box lambda" />
    <text x="35" y="30" text-anchor="middle" fill="white" class="label">Lambda</text>
    <text x="35" y="45" text-anchor="middle" fill="white" class="label">Function</text>
  </g>
  
  <g transform="translate(360, 150)">
    <rect width="70" height="50" rx="5" ry="5" class="box lambda" />
    <text x="35" y="30" text-anchor="middle" fill="white" class="label">Lambda</text>
    <text x="35" y="45" text-anchor="middle" fill="white" class="label">Function</text>
  </g>
  
  <g transform="translate(300, 210)">
    <rect width="100" height="50" rx="5" ry="5" class="box lambda" />
    <text x="50" y="30" text-anchor="middle" fill="white" class="label">Function</text>
    <text x="50" y="45" text-anchor="middle" fill="white" class="label">Scaling</text>
  </g>

  <!-- ECS Section -->
  <rect x="250" y="280" width="200" height="160" rx="10" ry="10" fill="#F3E5F5" stroke="#C925D1" stroke-width="1" />
  <text x="350" y="300" text-anchor="middle" class="label">AWS Fargate/ECS</text>
  
  <g transform="translate(270, 320)">
    <rect width="70" height="50" rx="5" ry="5" class="box ecs" />
    <text x="35" y="30" text-anchor="middle" fill="white" class="label">Fargate</text>
    <text x="35" y="45" text-anchor="middle" fill="white" class="label">Task</text>
  </g>
  
  <g transform="translate(360, 320)">
    <rect width="70" height="50" rx="5" ry="5" class="box ecs" />
    <text x="35" y="30" text-anchor="middle" fill="white" class="label">Fargate</text>
    <text x="35" y="45" text-anchor="middle" fill="white" class="label">Task</text>
  </g>
  
  <g transform="translate(300, 380)">
    <rect width="100" height="50" rx="5" ry="5" class="box ecs" />
    <text x="50" y="30" text-anchor="middle" fill="white" class="label">ECS</text>
    <text x="50" y="45" text-anchor="middle" fill="white" class="label">Cluster</text>
  </g>

  <!-- Supporting Services -->
  <g transform="translate(500, 110)">
    <rect width="220" height="100" rx="10" ry="10" fill="#E1F5FE" stroke="#0288D1" stroke-width="1" />
    <text x="110" y="130" text-anchor="middle" class="label">State Management</text>
    
    <g transform="translate(30, 30)">
      <rect width="70" height="50" rx="5" ry="5" class="box aws-orange" />
      <text x="35" y="30" text-anchor="middle" fill="white" class="label">Parameter</text>
      <text x="35" y="45" text-anchor="middle" fill="white" class="label">Store</text>
    </g>
    
    <g transform="translate(120, 30)">
      <rect width="70" height="50" rx="5" ry="5" class="box aws-orange" />
      <text x="35" y="30" text-anchor="middle" fill="white" class="label">S3</text>
      <text x="35" y="45" text-anchor="middle" fill="white" class="label">Storage</text>
    </g>
  </g>

  <g transform="translate(500, 220)">
    <rect width="220" height="100" rx="10" ry="10" fill="#E8F5E9" stroke="#388E3C" stroke-width="1" />
    <text x="110" y="240" text-anchor="middle" class="label">Task Coordination</text>
    
    <g transform="translate(30, 30)">
      <rect width="70" height="50" rx="5" ry="5" class="box aws-orange" />
      <text x="35" y="30" text-anchor="middle" fill="white" class="label">SQS</text>
      <text x="35" y="45" text-anchor="middle" fill="white" class="label">Queue</text>
    </g>
    
    <g transform="translate(120, 30)">
      <rect width="70" height="50" rx="5" ry="5" class="box aws-orange" />
      <text x="35" y="30" text-anchor="middle" fill="white" class="label">IAM</text>
      <text x="35" y="45" text-anchor="middle" fill="white" class="label">Roles</text>
    </g>
  </g>

  <g transform="translate(500, 330)">
    <rect width="220" height="100" rx="10" ry="10" fill="#FFF3E0" stroke="#F57C00" stroke-width="1" />
    <text x="110" y="350" text-anchor="middle" class="label">Resource Management</text>
    
    <g transform="translate(30, 30)">
      <rect width="70" height="50" rx="5" ry="5" class="box aws-orange" />
      <text x="35" y="30" text-anchor="middle" fill="white" class="label">CloudWatch</text>
      <text x="35" y="45" text-anchor="middle" fill="white" class="label">Metrics</text>
    </g>
    
    <g transform="translate(120, 30)">
      <rect width="70" height="50" rx="5" ry="5" class="box aws-orange" />
      <text x="35" y="30" text-anchor="middle" fill="white" class="label">CloudWatch</text>
      <text x="35" y="45" text-anchor="middle" fill="white" class="label">Logs</text>
    </g>
  </g>

  <!-- Connection Arrows -->
  <!-- Client to Lambda -->
  <line x1="170" y1="210" x2="240" y2="175" class="arrow" />
  
  <!-- Client to ECS -->
  <line x1="170" y1="250" x2="240" y2="345" class="arrow" />
  
  <!-- Client to State Management -->
  <line x1="110" y1="200" x2="110" y2="150" class="arrow" />
  <line x1="110" y1="150" x2="490" y2="150" class="arrow" />
  
  <!-- State Management to Lambda/ECS -->
  <line x1="500" y1="160" x2="450" y2="160" class="arrow" />
  <line x1="500" y1="180" x2="450" y2="340" class="arrow" />
  
  <!-- Task Coordination Connections -->
  <line x1="500" y1="260" x2="450" y2="180" class="arrow" />
  <line x1="500" y1="270" x2="450" y2="360" class="arrow" />
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="title">Serverless Mode Architecture</text>
  
  <!-- Legend -->
  <rect x="50" y="430" width="15" height="15" class="client" />
  <text x="75" y="443" class="label">Client</text>
  
  <rect x="130" y="430" width="15" height="15" class="lambda" />
  <text x="155" y="443" class="label">Lambda Function</text>
  
  <rect x="250" y="430" width="15" height="15" class="ecs" />
  <text x="275" y="443" class="label">ECS/Fargate</text>
  
  <rect x="370" y="430" width="15" height="15" class="aws-orange" />
  <text x="395" y="443" class="label">AWS Service</text>
  
  <line x1="490" y1="437" x2="520" y2="437" class="arrow" />
  <text x="550" y="443" class="label">Data Flow</text>
</svg>