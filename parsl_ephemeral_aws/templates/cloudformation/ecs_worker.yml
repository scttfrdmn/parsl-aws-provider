AWSTemplateFormatVersion: '2010-09-09'
Description: 'Parsl Ephemeral AWS Provider - ECS/Fargate Worker Resources'

Mappings:
  RegionMap:
    us-east-1:
      AMI: ami-0c55b159cbfafe1f0
    us-east-2:
      AMI: ami-002068ed284fb165b
    us-west-1:
      AMI: ami-0d382e80be7ffdae5
    us-west-2:
      AMI: ami-0a634ae95e11c6f91
    eu-west-1:
      AMI: ami-0860a63209d7da3d6
    eu-west-2:
      AMI: ami-0bca7a6ffed76bcca
    eu-west-3:
      AMI: ami-068a45d114884a8fe
    eu-central-1:
      AMI: ami-076431be45f8fcbf8
    ap-northeast-1:
      AMI: ami-0318ecd6d05daa212
    ap-northeast-2:
      AMI: ami-0a10b2721688ce9d2
    ap-southeast-1:
      AMI: ami-0d728fd4e52be968f
    ap-southeast-2:
      AMI: ami-075a72b1992cb0687
    ap-south-1:
      AMI: ami-0ebc1ac48dfd14136
    ca-central-1:
      AMI: ami-0b8cfb6b86d697313
    sa-east-1:
      AMI: ami-0b032e878a66c3b68

Parameters:
  ClusterName:
    Type: String
    Description: Name of the ECS cluster
    Default: ''

  TaskFamily:
    Type: String
    Description: Family name for the task definition
    Default: ''

  ContainerImage:
    Type: String
    Description: Docker image for the container
    Default: 'python:3.9-slim'

  TaskCpu:
    Type: Number
    Description: CPU units for the task
    Default: 1024
    AllowedValues:
      - 256
      - 512
      - 1024
      - 2048
      - 4096

  TaskMemory:
    Type: Number
    Description: Memory for the task in MB
    Default: 2048
    AllowedValues:
      - 512
      - 1024
      - 2048
      - 3072
      - 4096
      - 5120
      - 6144
      - 7168
      - 8192
      - 16384
      - 30720

  Command:
    Type: String
    Description: Command to run in the container
    Default: ''

  VpcId:
    Type: String
    Description: VPC ID for task networking
    Default: ''

  SubnetIds:
    Type: CommaDelimitedList
    Description: Subnet IDs for task networking
    Default: ''

  SecurityGroupIds:
    Type: CommaDelimitedList
    Description: Security group IDs for task networking
    Default: ''

  AssignPublicIp:
    Type: String
    Description: Whether to assign a public IP to the task
    Default: 'ENABLED'
    AllowedValues:
      - 'ENABLED'
      - 'DISABLED'

  WorkflowId:
    Type: String
    Description: Unique ID for the workflow

  JobId:
    Type: String
    Description: Unique ID for the job

  TaskCount:
    Type: Number
    Description: Number of tasks to run
    Default: 1
    MinValue: 1

  UseSpot:
    Type: String
    Description: Whether to use Fargate Spot
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'

  UseSpotFleet:
    Type: String
    Description: Whether to use EC2 Spot Fleet instead of Fargate/Fargate Spot
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'

  InstanceTypes:
    Type: String
    Description: JSON-encoded list of instance types to use with Spot Fleet
    Default: '[]'

  NodesPerBlock:
    Type: Number
    Description: Number of nodes per block for Spot Fleet
    Default: 1
    MinValue: 1

  SpotMaxPricePercentage:
    Type: String
    Description: Maximum spot price as percentage of on-demand price (empty for on-demand max)
    Default: ''

  Tags:
    Type: String
    Description: JSON encoded tags to apply to resources
    Default: '{}'

Conditions:
  HasVpcConfig: !Not [!Equals [!Ref VpcId, '']]
  HasCommand: !Not [!Equals [!Ref Command, '']]
  UseFargateSpot: !Equals [!Ref UseSpot, 'true']
  UseSpotFleet: !Equals [!Ref UseSpotFleet, 'true']
  HasClusterName: !Not [!Equals [!Ref ClusterName, '']]
  HasTaskFamily: !Not [!Equals [!Ref TaskFamily, '']]
  HasSpotMaxPrice: !Not [!Equals [!Ref SpotMaxPricePercentage, '']]
  UseFargate: !Not [!Condition UseSpotFleet]
  AssignPublicIpEnabled: !Equals [!Ref AssignPublicIp, 'ENABLED']

Resources:
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !If
        - HasClusterName
        - !Ref ClusterName
        - !Sub 'parsl-cluster-${WorkflowId}'
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: !If [UseFargateSpot, 'FARGATE_SPOT', 'FARGATE']
          Weight: 1
      Tags:
        - Key: ParslResource
          Value: 'true'
        - Key: ParslWorkflowId
          Value: !Ref WorkflowId

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Tags:
        - Key: ParslResource
          Value: 'true'
        - Key: ParslWorkflowId
          Value: !Ref WorkflowId
        - Key: ParslJobId
          Value: !Ref JobId

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Tags:
        - Key: ParslResource
          Value: 'true'
        - Key: ParslWorkflowId
          Value: !Ref WorkflowId
        - Key: ParslJobId
          Value: !Ref JobId

  SpotFleetRole:
    Type: AWS::IAM::Role
    Condition: UseSpotFleet
    Properties:
      RoleName: !Sub 'parsl-aws-spot-fleet-role-${WorkflowId}-${JobId}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: spotfleet.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2SpotFleetTaggingRole
      Tags:
        - Key: ParslResource
          Value: 'true'
        - Key: ParslWorkflowId
          Value: !Ref WorkflowId
        - Key: ParslJobId
          Value: !Ref JobId

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/ecs/parsl-${WorkflowId}-${JobId}'
      RetentionInDays: 7
      Tags:
        - Key: ParslResource
          Value: 'true'
        - Key: ParslWorkflowId
          Value: !Ref WorkflowId
        - Key: ParslJobId
          Value: !Ref JobId

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !If
        - HasTaskFamily
        - !Ref TaskFamily
        - !Sub 'parsl-task-${WorkflowId}-${JobId}'
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      ContainerDefinitions:
        - Name: !Sub 'parsl-container-${WorkflowId}-${JobId}'
          Image: !Ref ContainerImage
          Essential: true
          Command: !If [HasCommand, !Split [',', !Ref Command], !Ref 'AWS::NoValue']
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref 'AWS::Region'
              awslogs-stream-prefix: parsl
      Tags:
        - Key: ParslResource
          Value: 'true'
        - Key: ParslWorkflowId
          Value: !Ref WorkflowId
        - Key: ParslJobId
          Value: !Ref JobId

  ECSService:
    Type: AWS::ECS::Service
    Condition: UseFargate
    Properties:
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: !Ref TaskCount
      LaunchType: !If [UseFargateSpot, !Ref 'AWS::NoValue', 'FARGATE']
      CapacityProviderStrategy: !If
        - UseFargateSpot
        - - CapacityProvider: FARGATE_SPOT
            Weight: 1
        - !Ref 'AWS::NoValue'
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: !Ref AssignPublicIp
          Subnets: !Ref SubnetIds
          SecurityGroups: !Ref SecurityGroupIds
      Tags:
        - Key: ParslResource
          Value: 'true'
        - Key: ParslWorkflowId
          Value: !Ref WorkflowId
        - Key: ParslJobId
          Value: !Ref JobId


  SpotFleetRequest:
    Type: AWS::EC2::SpotFleet
    Condition: UseSpotFleet
    Properties:
      SpotFleetRequestConfigData:
        AllocationStrategy: diversified
        IamFleetRole: !GetAtt SpotFleetRole.Arn
        TargetCapacity: !Ref NodesPerBlock
        TerminateInstancesWithExpiration: true
        Type: maintain
        ReplaceUnhealthyInstances: true
        InstanceInterruptionBehavior: terminate
        LaunchTemplateConfigs:
          - LaunchTemplateSpecification:
              LaunchTemplateId: !Ref SpotFleetLaunchTemplate
              Version: !GetAtt SpotFleetLaunchTemplate.LatestVersionNumber
            Overrides:
              - InstanceType: t3.small
                SubnetId: !Select [0, !Ref SubnetIds]
              - InstanceType: t3a.small
                SubnetId: !Select [0, !Ref SubnetIds]
              - InstanceType: t3.medium
                SubnetId: !Select [0, !Ref SubnetIds]
              - InstanceType: t3a.medium
                SubnetId: !Select [0, !Ref SubnetIds]
              - InstanceType: m5.large
                SubnetId: !Select [0, !Ref SubnetIds]
              - InstanceType: m5a.large
                SubnetId: !Select [0, !Ref SubnetIds]
        TagSpecifications:
          - ResourceType: spot-fleet-request
            Tags:
              - Key: ParslResource
                Value: 'true'
              - Key: ParslWorkflowId
                Value: !Ref WorkflowId
              - Key: ParslJobId
                Value: !Ref JobId
              - Key: Name
                Value: !Sub 'parsl-spot-fleet-${WorkflowId}-${JobId}'
          - ResourceType: instance
            Tags:
              - Key: ParslResource
                Value: 'true'
              - Key: ParslWorkflowId
                Value: !Ref WorkflowId
              - Key: ParslJobId
                Value: !Ref JobId
              - Key: Name
                Value: !Sub 'parsl-spot-fleet-instance-${WorkflowId}-${JobId}'

  SpotFleetLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Condition: UseSpotFleet
    Properties:
      LaunchTemplateData:
        NetworkInterfaces:
          - DeviceIndex: 0
            Groups: !Ref SecurityGroupIds
            AssociatePublicIpAddress: !If [AssignPublicIpEnabled, true, false]
        UserData:
          Fn::Base64:
            !Sub |
              #!/bin/bash
              echo "Starting Parsl worker..."
              mkdir -p /tmp/parsl
              echo "${Command}" > /tmp/parsl/command.sh
              chmod +x /tmp/parsl/command.sh
              /tmp/parsl/command.sh
              echo "Parsl worker completed."
        TagSpecifications:
          - ResourceType: launch-template
            Tags:
              - Key: ParslResource
                Value: 'true'
              - Key: ParslWorkflowId
                Value: !Ref WorkflowId
              - Key: ParslJobId
                Value: !Ref JobId

Outputs:
  ClusterName:
    Description: Name of the ECS cluster
    Value: !Ref ECSCluster

  TaskDefinitionArn:
    Description: ARN of the task definition
    Value: !Ref TaskDefinition

  ServiceName:
    Description: Name of the ECS service
    Condition: UseFargate
    Value: !GetAtt ECSService.Name

  SpotFleetRequestId:
    Description: ID of the Spot Fleet request
    Condition: UseSpotFleet
    Value: !Ref SpotFleetRequest

  LogGroupName:
    Description: Name of the CloudWatch Logs log group
    Value: !Ref LogGroup
