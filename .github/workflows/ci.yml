name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,test]"
      - name: Lint with flake8
        run: |
          flake8 parsl_ephemeral_aws tests
      - name: Type check with mypy
        run: |
          mypy parsl_ephemeral_aws

  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9, "3.10", 3.11, 3.12]
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,test]"
      - name: Run unit tests with moto
        run: |
          pytest tests/unit -v --cov=parsl_ephemeral_aws --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: python-${{ matrix.python-version }}-moto

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      localstack:
        image: localstack/localstack:latest
        env:
          SERVICES: ec2,s3,ssm,lambda,ecs,iam,cloudformation
          DEBUG: true
        ports:
          - 4566:4566
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,test]"
      - name: Wait for LocalStack to be ready
        timeout-minutes: 2
        run: |
          echo "Waiting for LocalStack to be ready..."
          while ! curl -s http://localhost:4566/_localstack/health | grep -q '"s3":"available"'; do
            sleep 5
          done
          echo "LocalStack is ready!"
      - name: Run integration tests with LocalStack
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
          AWS_ENDPOINT_URL: http://localhost:4566
          LOCALSTACK_ENDPOINT: http://localhost:4566
        run: |
          pytest tests/integration -v --cov=parsl_ephemeral_aws --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: integration
          name: python-localstack

  test-bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up bats
        run: |
          sudo npm install -g bats
          mkdir -p /usr/local/lib/bats
          git clone https://github.com/bats-core/bats-support.git /usr/local/lib/bats/bats-support
          git clone https://github.com/bats-core/bats-assert.git /usr/local/lib/bats/bats-assert
          git clone https://github.com/bats-core/bats-file.git /usr/local/lib/bats/bats-file
      - name: Run bats tests
        run: |
          bats tests/bats/

  build:
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: Build package
        run: |
          python -m build
      - name: Check package with twine
        run: |
          twine check dist/*

  docs:
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,docs]"
      - name: Build documentation
        run: |
          if [ -d docs ]; then
            cd docs
            make html
          else
            echo "No docs directory found, skipping documentation build"
          fi
      - name: Upload documentation
        if: success() && hashFiles('docs/_build/html') != ''
        uses: actions/upload-artifact@v3
        with:
          name: documentation
          path: docs/_build/html/
